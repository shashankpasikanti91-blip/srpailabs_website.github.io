# ============================================================
#  SRP AI Labs — Nginx Reverse Proxy Configuration
#  Deploy to: /etc/nginx/sites-available/srpailabs.conf
#  Enable:    ln -s /etc/nginx/sites-available/srpailabs.conf /etc/nginx/sites-enabled/
#  SSL:       certbot --nginx -d srpailabs.com -d www.srpailabs.com \
#                              -d autonomous.srpailabs.com \
#                              -d app.srpailabs.com \
#                              -d mediflow.srpailabs.com \
#                              -d recruit.srpailabs.com \
#                              -d growth.srpailabs.com
# ============================================================

# --- Redirect HTTP → HTTPS for all domains ---
server {
    listen 80;
    server_name srpailabs.com www.srpailabs.com
                autonomous.srpailabs.com
                app.srpailabs.com
                mediflow.srpailabs.com
                recruit.srpailabs.com
                growth.srpailabs.com
                automation.srpailabs.com
                hrms.srpailabs.com
                nutrisutra.srpailabs.com
                edu.srpailabs.com
                kids.srpailabs.com;

    return 301 https://$host$request_uri;
}

# ============================================================
#  Main marketing site — srpailabs.com
# ============================================================
server {
    listen 443 ssl http2;
    server_name srpailabs.com www.srpailabs.com;

    ssl_certificate     /etc/letsencrypt/live/srpailabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srpailabs.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/srpailabs/dist;
    index index.html;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data: https:;" always;

    # www → non-www redirect
    if ($host = www.srpailabs.com) {
        return 301 https://srpailabs.com$request_uri;
    }
}

# ============================================================
#  Autonomous OS — autonomous.srpailabs.com
#  Backend: Node.js / Python app on port 3001
# ============================================================
server {
    listen 443 ssl http2;
    server_name autonomous.srpailabs.com;

    ssl_certificate     /etc/letsencrypt/live/srpailabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srpailabs.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

